experiment_name: nsgrand_fir_full
seed: 20260411
output_dir: outputs/nsgrand_fir_full

code:
  n: 128
  k: 64
  p_column_weight: 3
  seed: 31415

channel:
  backend: sionna_tdl
  allow_fallback: true
  profile_family: TDL
  train_profiles: [A, C, E]
  eval_profiles: [A, C, E]
  delay_spread_s: 1.0e-7
  carrier_frequency_hz: 3.5e9
  subcarrier_spacing_hz: 1.5e4
  min_speed_mps: 0.0
  max_speed_mps: 10.0
  normalization: true

data:
  train_samples: 40000
  val_samples: 8000
  shard_size: 4000
  batch_size: 256
  snr_min_db: -4.0
  snr_max_db: 8.0
  trace_fraction: 0.01

model:
  d_model: 64
  n_heads: 4
  n_layers: 2
  ff_multiplier: 4
  dropout: 0.1
  num_segments: 8
  max_weight_class: 4

train:
  epochs: 12
  batch_size: 512
  learning_rate: 0.002
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  early_stopping_patience: 3
  bit_loss_weight: 1.0
  weight_loss_weight: 0.4
  segment_loss_weight: 0.3
  confidence_loss_weight: 0.2
  positive_bit_class_weight: 12.0

search:
  baseline_pool_size: 24
  baseline_max_weight: 4
  baseline_budget: 2500
  baseline_weight_penalties: [0.0, 0.0, 0.15, 0.4, 0.9]
  ai_pool_size: 18
  ai_max_weight: 4
  ai_budget: 1200
  fallback_budget: 1800
  ai_weight_penalties: [0.0, -0.05, 0.0, 0.2, 0.55]
  top_segments: 3
  top_bits_extra: 6
  candidate_mass_threshold: 0.85
  confidence_threshold: 0.35
  trace_top_attempts: 25

eval:
  snr_grid_db: [-4.0, -2.0, 0.0, 2.0, 4.0, 6.0]
  samples_per_point: 1200
  batch_size: 200
  trace_fraction: 0.02

resources:
  generation_workers: 16
  generation_threads_per_worker: 4
  evaluation_workers: 16
  evaluation_threads_per_worker: 4
  train_torch_threads: 48
  train_torch_interop_threads: 1
  train_loader_workers: 4
