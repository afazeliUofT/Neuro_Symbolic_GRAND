experiment_name: nsgrand_fir_smoke
seed: 20260411
output_dir: outputs/nsgrand_fir_smoke

code:
  n: 64
  k: 32
  p_column_weight: 3
  seed: 2718

channel:
  backend: sionna_tdl
  allow_fallback: true
  profile_family: TDL
  train_profiles: [A, C]
  eval_profiles: [A, C]
  delay_spread_s: 1.0e-7
  carrier_frequency_hz: 3.5e9
  subcarrier_spacing_hz: 1.5e4
  min_speed_mps: 0.0
  max_speed_mps: 5.0
  normalization: true

data:
  train_samples: 3000
  val_samples: 800
  shard_size: 500
  batch_size: 128
  snr_min_db: -2.0
  snr_max_db: 6.0
  trace_fraction: 0.02

model:
  d_model: 48
  n_heads: 4
  n_layers: 2
  ff_multiplier: 4
  dropout: 0.1
  num_segments: 8
  max_weight_class: 4

train:
  epochs: 4
  batch_size: 256
  learning_rate: 0.002
  weight_decay: 0.0001
  early_stopping_patience: 2
  positive_bit_class_weight: 8.0

search:
  baseline_pool_size: 18
  baseline_max_weight: 4
  baseline_budget: 800
  ai_pool_size: 14
  ai_max_weight: 4
  ai_budget: 400
  fallback_budget: 600
  top_segments: 3
  top_bits_extra: 4
  confidence_threshold: 0.4
  trace_top_attempts: 20

eval:
  snr_grid_db: [-2.0, 0.0, 2.0, 4.0]
  samples_per_point: 250
  batch_size: 125
  trace_fraction: 0.05

resources:
  generation_workers: 4
  generation_threads_per_worker: 2
  evaluation_workers: 4
  evaluation_threads_per_worker: 2
  train_torch_threads: 8
  train_torch_interop_threads: 1
  train_loader_workers: 1
